version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/front"
    schedule:
      interval: "monthly"
      time: "04:00"
    rebase-strategy: "disabled"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    assignees:
      - "IvaKop"
    reviewers:
      - "IvaKop"
  - package-ecosystem: "bundler"
    directory: "/back"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    assignees:
      - "adessy"
    reviewers:
      - "adessy"
  - package-ecosystem: npm
    directory: '/cl2-component-library'
    schedule:
      interval: monthly
      time: '04:00'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    assignees:
      - 'IvaKop'
    reviewers:
      - 'IvaKop'
