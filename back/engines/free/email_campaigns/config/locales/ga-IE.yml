    project_moderation_rights_received:
      cta_button: 'Bainistigh an tionscadal seo'
      event_description: 'Rinne riarthóir ar ardán rannpháirtíochta %{organizationName} bainisteoir tionscadail thú ar an tionscadal seo a leanas:'
      no_ideas: 'Gan aon smaointe fós'
      preheader: 'Rinne riarthóir ar ardán rannpháirtíochta %{organizationName} bainisteoir tionscadail den tionscadal seo a leanas díot díreach anois.'
      subject: 'Rinneadh bainisteoir tionscadail díot ar ardán %{organizationName}'
      text_design_participatory_process: 'Mar bhainisteoir tionscadail, is féidir leat a chumrú conas a idirghníomhaíonn úsáideoirí laistigh de do thionscadal. Is féidir leat céimeanna nua a chur leis ag baint úsáide as an amlíne. Féadfaidh iompar féin a bheith ag gach ceann de na céimeanna seo maidir le postáil smaointe, trácht a dhéanamh agus vótáil.'
      text_moderate_analyse_input: 'Nuair a bheidh an tionscadal seolta, tiocfaidh na chéad smaointe isteach. Gheobhaidh tú tuarascálacha seachtainiúla leis na príomhghníomhaíochtaí go léir ionas go mbeidh tú ar an eolas faoi chúrsaí. Cabhróidh an forbhreathnú ar na smaointe i radharc do bhainisteora tionscadail leat tuiscint a fháil ar na smaointe a thaitin agus nach dtaitníonn leis an gcuid is mó.'
      text_share_project_information: 'Chun feabhas a chur ar cháilíocht na smaointe atá á bhfáil agat, tá sé ríthábhachtach go leor eolais a roinnt: cuir cur síos ar an tionscadal leis, ceangail íomhánna (lena n-áirítear sceitsí agus pleananna), agus cuir in iúl na himeachtaí gaolmhara go léir atá ar siúl. Cuimhnigh: tagann dea-eolas roimh rannpháirtíocht mhaith!'
      title_design_participatory_process: 'Dearadh an phróisis rannpháirtíochta'
      title_moderate_analyse_input: 'Déan an t-ionchur a mhodhnú agus a anailísiú'
      title_share_project_information: 'Faisnéis tionscadail a sholáthar'
      title_what_can_you_do_moderator: 'Cad is féidir leat a dhéanamh mar bhainisteoir tionscadail?'
      title: 'Rinneadh bainisteoir tionscadail díot'
      x_ideas: '%{numberOfIdeas} ideas'
    project_folder_moderation_rights_received:
      cta_button: 'Féach ar an bhfillteán seo'
      event_description: 'Tugadh cearta bainisteora fillteán duit ar ardán rannpháirtíochta %{organizationName}don fhillteán seo a leanas:'
      no_projects: 'Gan aon tionscadail fós'
      preheader: 'Rinne riarthóir ardán rannpháirtíochta %{organizationName} bainisteoir den fhillteán seo a leanas díot díreach anois.'
      subject: 'Rinneadh bainisteoir fillteán tionscadail díot ar ardán rannpháirtíochta %{organizationName}'
      text_manage_folder: 'Is bealach é fillteán chun roinnt tionscadal rannpháirtíochta a eagrú le chéile. Mar bhainisteoir fillteán, is féidir leat an fillteán agus cur síos an fhillteáin a chur in eagar agus tionscadail nua a chruthú (chun tionscadail a scriosadh, déan teagmháil le riarthóir d’ardáin). Beidh cearta bainistíochta tionscadail agat freisin thar na tionscadail uile laistigh den fhillteán, rud a ligfidh duit na tionscadail a chur in eagar, na hionchuir a bhainistiú agus ríomhphost a sheoladh chuig rannpháirtithe.'
      text_moderate_analyse_input: 'Nuair a bheidh na tionscadail seolta, tosóidh na chéad ionchur ag teacht isteach. Gheobhaidh tú tuarascálacha seachtainiúla leis na príomhghníomhaíochtaí ionas gur féidir leat fanacht ar bharr a bhfuil ag tarlú. Ligeann an Bainisteoir Ionchuir i do phainéal ''Bainistigh Ardán'' duit an t-ionchur a fheiceáil agus a bhainistiú, lena n-áirítear stádais a shannadh agus freagairt a thabhairt ar phoist agus ar thráchtanna.'
      text_design_participatory_process: 'Is féidir leat na tionscadail rannpháirtíochta éagsúla a bhainistiú laistigh de do fhillteán - an modh rannpháirtíochta a chumrú, cur síos tionscadail a chur leis, íomhánna a cheangal, agus imeachtaí gaolmhara a chur in iúl. Is féidir leat a bhainistiú freisin conas a idirghníomhaíonn rannpháirtithe le do thionscadail, lena n-áirítear cearta rochtana a shocrú agus na socruithe postála, vótála agus tráchta a chumrú.'
      title_design_participatory_process: 'Dearadh an phróisis rannpháirtíochta'
      title_moderate_analyse_input: 'Déan an t-ionchur a mhodhnú agus a anailísiú'
      title_manage_folder: 'Bainistigh socruithe an fhillteáin agus cruthaigh tionscadail nua.'
      title_what_can_you_do_folderadmin: 'Cad is féidir leat a dhéanamh mar bhainisteoir fillteán?'
      title: 'Cuireadh leis thú mar bhainisteoir fillteán'
