      text_create_participatory_process: 'Mar riarthóir, is féidir leat tionscadail rannpháirtíochta nua a chruthú agus a chumrú. Is féidir leat céimeanna nua a chur leis ag baint úsáide as an amlíne. Féadfaidh iompar féin a bheith ag gach ceann de na céimeanna seo maidir le postáil smaointe, trácht a dhéanamh agus vótáil.'
      text_moderate_analyse_input: 'Nuair a sheolfar tionscadail, tiocfaidh na chéad smaointe isteach. Gheobhaidh tú tuarascálacha seachtainiúla leis na príomhghníomhaíochtaí go léir ionas go mbeidh tú ar an eolas faoi chúrsaí. Cabhróidh an forbhreathnú ar smaointe leat an t-ionchur a mhodhnú agus comhoibriú chun é a phróiseáil.'
      text_platform_setup: 'Mar riarthóir is féidir leat d’ardán rannpháirtíochta a bhunú. Roghnaigh lógó, íomhánna agus dathanna, scríobh teachtaireacht phearsanta ar do leathanach baile, cuirí a sheoladh amach, sainmhínigh cad ba mhaith leat a fháil amach faoi d’úsáideoirí, ...'
      title_create_participatory_process: 'Dearadh an phróisis rannpháirtíochta'
