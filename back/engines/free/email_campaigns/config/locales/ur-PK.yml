      subject: آپ %{organizationName}کے پلیٹ فارم پر ایڈمنسٹریٹر بن گئے۔
      text_create_participatory_process: ایڈمنسٹریٹر کے طور پر، آپ شرکت کے نئے پروجیکٹس بنا اور ترتیب دے سکتے ہیں۔ آپ ٹائم لائن کا استعمال کرتے ہوئے نئے مراحل شامل کر سکتے ہیں۔ ان مراحل میں سے ہر ایک کا خیال پوسٹ کرنے، تبصرہ کرنے اور ووٹنگ کے حوالے سے اپنا طرز عمل ہو سکتا ہے۔
      text_moderate_analyse_input: پروجیکٹ شروع ہونے کے بعد، پہلے آئیڈیاز سامنے آئیں گے۔ آپ کو تمام اہم سرگرمیوں کے ساتھ ہفتہ وار رپورٹس موصول ہوں گی تاکہ آپ سب سے اوپر رہیں۔ آئیڈیاز کا جائزہ آپ کو ان پٹ کو اعتدال میں لانے اور اس پر کارروائی کرنے میں تعاون کرنے میں مدد کرے گا۔
      text_platform_setup: بطور منتظم آپ اپنا شرکت کا پلیٹ فارم ترتیب دے سکتے ہیں۔ لوگو، تصاویر اور رنگوں کا انتخاب کریں، اپنے ہوم پیج پر ذاتی پیغام لکھیں، دعوت نامے بھیجیں، اس بات کی وضاحت کریں کہ آپ اپنے صارفین کے بارے میں کیا جاننا چاہتے ہیں،...
