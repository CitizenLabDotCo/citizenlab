      text_manage_folder: Ένας φάκελος είναι ένας τρόπος οργάνωσης πολλών έργων συμμετοχής μαζί. Ως διαχειριστής φακέλου, μπορείτε να επεξεργαστείτε τον φάκελο και την περιγραφή του φακέλου και να δημιουργήσετε νέα έργα (για να διαγράψετε έργα, επικοινωνήστε με τον διαχειριστή της πλατφόρμας σας). Θα έχετε επίσης δικαιώματα διαχείρισης έργων σε όλα τα έργα εντός του φακέλου, επιτρέποντάς σας να επεξεργάζεστε τα έργα, να διαχειρίζεστε τις εισροές και να στέλνετε email στους συμμετέχοντες.
      text_moderate_analyse_input: Μόλις δρομολογηθούν τα έργα, θα αρχίσουν να έρχονται οι πρώτες εισροές. Θα λαμβάνετε εβδομαδιαίες αναφορές με τις βασικές δραστηριότητες, ώστε να μπορείτε να παρακολουθείτε τι συμβαίνει. Ο Διαχειριστής εισροών στον πίνακα "Διαχείριση πλατφόρμας" σας επιτρέπει να βλέπετε και να διαχειρίζεστε τις εισροές, συμπεριλαμβανομένης της ανάθεσης καταστάσεων και της απάντησης σε αναρτήσεις και σχόλια.
