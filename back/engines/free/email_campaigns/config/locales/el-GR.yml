      title_manage_folder: Διαχειριστείτε τις ρυθμίσεις των φακέλων και δημιουργήστε νέα έργα.
      title_moderate_analyse_input: Μετριοποίηση και ανάλυση των εισροών
      title_what_can_you_do_folderadmin: Τι μπορείτε να κάνετε ως διαχειριστής φακέλων;
