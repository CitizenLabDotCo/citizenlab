    project_moderation_rights_received:
      cta_button: Διαχειριστείτε αυτό το έργο
      event_description: 'Ένας διαχειριστής της πλατφόρμας συμμετοχής του %{organizationName} μόλις σας έκανε διαχειριστή του ακόλουθου έργου:'
      no_ideas: Καμία ιδέα ακόμα
      preheader: Ένας διαχειριστής της πλατφόρμας συμμετοχής του %{organizationName} μόλις σας έκανε διαχειριστή του ακόλουθου έργου
      subject: Έγινες διαχειριστής έργων στην πλατφόρμα %{organizationName}.
      text_design_participatory_process: Ως διαχειριστής έργου, μπορείτε να ρυθμίσετε τον τρόπο με τον οποίο οι χρήστες αλληλεπιδρούν στο έργο σας. Μπορείτε να προσθέσετε νέες φάσεις χρησιμοποιώντας το χρονοδιάγραμμα. Κάθε μία από αυτές τις φάσεις μπορεί να έχει τη δική της συμπεριφορά όσον αφορά τη δημοσίευση ιδεών, το σχολιασμό και την ψηφοφορία.
      text_moderate_analyse_input: Μόλις ξεκινήσει το έργο, θα έρθουν οι πρώτες ιδέες. Θα λαμβάνετε εβδομαδιαίες αναφορές με όλες τις βασικές δραστηριότητες, ώστε να παραμένετε στην κορυφή των πραγμάτων. Η επισκόπηση των ιδεών στην προβολή του διαχειριστή έργου σας θα σας βοηθήσει να καταλάβετε ποιες ιδέες έλαβαν τα περισσότερα upvotes και downvotes.
      text_share_project_information: 'Για να αυξήσετε την ποιότητα των ιδεών που λαμβάνετε, είναι βασικό να μοιράζεστε επαρκείς πληροφορίες: προσθέστε μια περιγραφή του έργου, επισυνάψτε εικόνες (συμπεριλαμβανομένων σκίτσων και σχεδίων) και κοινοποιήστε όλα τα σχετικά γεγονότα που λαμβάνουν χώρα. Να θυμάστε: η καλή πληροφόρηση προηγείται της καλής συμμετοχής!'
