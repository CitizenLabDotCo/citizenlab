      cta_button: Διαχειριστείτε την πλατφόρμα σας
      event_description: Σας έχουν χορηγηθεί δικαιώματα διαχειριστή για την πλατφόρμα συμμετοχής %{organizationName}.
      preheader: Σας χορηγήθηκαν δικαιώματα διαχειριστή για την πλατφόρμα συμμετοχής του %{organizationName}
      subject: Έγινες διαχειριστής στην πλατφόρμα %{organizationName}
      text_create_participatory_process: Ως διαχειριστής, μπορείτε να δημιουργήσετε και να διαμορφώσετε νέα έργα συμμετοχής. Μπορείτε να προσθέσετε νέες φάσεις χρησιμοποιώντας το χρονοδιάγραμμα. Κάθε μία από αυτές τις φάσεις μπορεί να έχει τη δική της συμπεριφορά όσον αφορά την ανάρτηση ιδεών, τον σχολιασμό και την ψηφοφορία.
      text_moderate_analyse_input: Μόλις ξεκινήσουν τα έργα, θα έρθουν οι πρώτες ιδέες. Θα λαμβάνετε εβδομαδιαίες αναφορές με όλες τις βασικές δραστηριότητες, ώστε να παραμένετε στην κορυφή των πραγμάτων. Η επισκόπηση των ιδεών θα σας βοηθήσει να μετριάσετε τις εισροές και να συνεργαστείτε για την επεξεργασία τους.
      text_platform_setup: Ως διαχειριστής μπορείτε να ρυθμίσετε την πλατφόρμα συμμετοχής σας. Επιλέξτε ένα λογότυπο, εικόνες και χρώματα, γράψτε ένα προσωπικό μήνυμα στην αρχική σας σελίδα, στείλτε προσκλήσεις, ορίστε τι θέλετε να γνωρίζετε από τους χρήστες σας, ...
      title: Έγινες διαχειριστής
      title_create_participatory_process: Σχεδιασμός της συμμετοχικής διαδικασίας
      title_moderate_analyse_input: Μετριοποίηση και ανάλυση των εισροών
      title_platform_setup: Ρυθμίστε την πλατφόρμα σας
      title_what_can_you_do_administrator: Τι μπορείτε να κάνετε ως διαχειριστής;
