    admin_rights_received:
      cta_button: إدارة منصتك
      event_description: لقد تم منحك حقوق المسؤول لمنصة المشاركة الخاصة بـ %{organizationName}.
      preheader: تم منحك حقوق المسؤول عن منصة المشاركة الخاصة بـ %{organizationName}
      subject: لقد أصبحت المسؤول عن المنصة الخاصة بـ%{organizationName}
      text_create_participatory_process: بصفتك مسؤولًا، يمكنك إنشاء وتهيئة مشاريع المشاركة الجديدة. يمكنك أيضًا إضافة مراحل جديدة باستخدام الجدول الزمني. كل واحدة من هذه المراحل لديها سلوكها الخاص فيما يتعلق بنشر الأفكار، والتعليق عليها، والتصويت لها.
      text_moderate_analyse_input: بمجرد إطلاق المشاريع، ستبدأ الأفكار بالتدفق. ستستلم تقارير أسبوعية حول جميع الأنشطة الرئيسية حتى تبقى على اطلاع تام بكافة المُجريات. ستساعدك النظرة العامة على الأفكار في تنسيق المُدخلات والتعاون في معالجتها.
      text_platform_setup: بصفتك مسؤولًا ستتمكن من إعداد منصة المشاركة الخاصة بك. اختر شعارًا، وصورًا، وألوانًا، واكتب رسالة شخصية على صفحتك الرئيسية، وأرسل الدعوات، وحدّد الأمور التي ترغب في معرفتها حول المستخدمين لديك، ...
      title: لقد أصبحت مديرا
      title_create_participatory_process: صمّم عملية المشاركة
      title_moderate_analyse_input: قم بالإشراف على المُدخلات وتحليلها
      title_platform_setup: قم بإعداد منصتك
      title_what_can_you_do_administrator: ما الذي يمكنك القيام به بصفتك مسؤولًا؟
