        inputs: "Daoine a fhreagraíonn %{answer1} go %{question1} a fhreagraíonn %{answer2} go %{question2} %{percent_more_less} níos airde ná an meán."
        likes: "Is fearr le daoine a fhreagraíonn %{answer1} go %{question1} ionchuir %{percent_more_less} nuair a fhreagraíonn siad %{answer2} go %{question2} ná an meán."
        dislikes: "Is beag an meas atá ag daoine a fhreagraíonn %{answer1} go %{question1} ar ionchur %{percent_more_less} nuair a fhreagraíonn siad %{answer2} go %{question2} ná an meán."
        participants: "Bíonn daoine a fhreagraíonn %{answer1} go %{question1} níos rannpháirteacha i %{percent_more_less} nuair a fhreagraíonn siad %{answer2} go %{question2} ná an meán."

