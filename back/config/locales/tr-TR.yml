    privacy_policy_body: |
      <p>Verilerin işlenmesinden sorumludur:</p> <p>Go Vocal NV - Pachecolaan 34 - 1000 Brüksel - Belçika</p> <p>İletişim e-posta adresi: support@govocal.com</p> <p>Organizasyon: //müşteri iletişim bilgilerini giriniz</p> <h2>1. GİZLİLİK POLİTİKASI</h2> <p>Bu 'Gizlilik Politikası' Go Vocal tarafından bu web sitesi aracılığıyla kuruluş adına toplanan 'Kişisel Veriler' için geçerlidir.</p> <h2>2. KİŞİSEL VERİLER NEDİR?</h2> <p>Bu Gizlilik Politikasında, Kişisel Veriler sizi tanımlamayı mümkün kılan bilgileri ifade eder. Tanımlanabilir bir kişi, doğrudan veya dolaylı olarak, özellikle bir kimlik numarasına veya fiziksel, fizyolojik, zihinsel, ekonomik, kültürel veya sosyal kimlikle bağlantılı bir veya daha fazla faktöre atıfta bulunarak tanımlanabilen kişidir. Kişisel bilgilerin tipik bir örneği adınız ve e-posta adresinizdir.</p> <h2>3. HANGİ KİŞİSEL VERİLERİ TOPLARIZ?</h2> <p>Kişisel Verilerinizi aşağıdaki üç kaynaktan toplayabiliriz:</p> <h3>3.1 Platforma kayıt işlemi sırasında sağladığınız ve bazıları isteğe bağlı olan Kişisel Veriler.</h3> <p>Sizden toplayabileceğimiz kişisel veriler şunlardır:</p> <ul> <li>Ad ve soyadı</li> <li>E-posta adresi</li> <li>Doğum yılı</li> <li>Cinsiyet</li> <li>İkamet edilen bölge</li> <li>Tercih edilen dil</li> </ul> <p>Bu liste, kuruluşun talebi üzerine genişletilebilir. Google Accounts, Facebook veya FranceConnect gibi bir 3. taraf kimlik doğrulama sağlayıcısı aracılığıyla oturum açmayı seçerseniz bu verileri onlardan alırız. Kimliğinizi COW, FranceConnect veya CSAM gibi bir 3. taraf kimlik sağlayıcısı ile doğrulamayı seçerseniz bu bilgileri onlardan alırız.</p> <h3>3.2 Platformumuzdaki katılımcı faaliyetlerinizde sağladığınız kişisel veriler.</h3> <p>Platformda gerçekleştirdiğiniz her eylem (oylama, fikir yayınlama, yorum yazma, anketi yanıtlama vb.) kaydedilir ve saklanır. Bu veriler aynı zamanda kayıt verilerinizle (3.1) bağlantılıdır, bu da kuruluşun platform profilinizi bu katılım verileriyle ilişkilendirebileceği anlamına gelir.</p> <h3>3.3 Platformumuzu ziyaret ettiğinizde topladığımız Kişisel Veriler.</h3> <p>Biz (ve bizim adımıza hareket eden üçüncü taraf bilgi işleyiciler) platformun çalışma performansını ve güvenliğini değerlendirmek için platformumuzun kullanımı hakkında bilgi toplarız. Bu amaçla, IP adresiniz ve tarayıcı ayrıntılarınız gibi sizi tanımlayabilecek teknik bilgileri toplarız. Hizmetlerimizi kullandığınızda bu tür verilerin toplanmasını kabul etmiş olursunuz.</p> <p>Hizmetlerimizi geliştirmek için kullanım verilerini de toplarız, istediğiniz zaman bu verilerin toplanmasını onay yöneticisinden devre dışı bırakabilirsiniz.</p> <h2>4. KİŞİSEL VERİLERİ NASIL KULLANIRIZ?</h2> <p>Kişisel verilerinizi aşağıdaki amaçlar için kullanabiliriz:</p> <ul> <li>Öncelikle ve en önemlisi, girdilerinizi ilgili bağlamda kuruluşa iletmek ve karar vermelerine yardımcı olmak için bu platformda toplanan tüm verilerin toplu raporlarını çıkarmak.</li> <li>Bu web sitesinde kullanıcı profilinizi oluşturmak ve tutmak.</li> <li>Kullanıcıların tanımlanmasını ve kimlik doğrulamasını yönetmek.</li> <li>Topluluğunuz hakkında bilgi vermek ve/veya platformda ilginizi çekebilecek faaliyetler olduğunda sizi bilgilendirmek. E-posta bildirimleri alma tercihlerinizi kullanıcı profilinizden istediğiniz zaman devre dışı bırakabilirsiniz.</li> <li>Hizmetlerimizi geliştirmek ve işleyişini izlemek için.</li> </ul> <p>Kişisel veriler yalnızca işlenmeleri için gereken süre boyunca saklanır ve işlenir. Ardından veriler silinir veya anonimleştirilir.</p> <h2>5. KİŞİSEL VERİLERİNİZİ KİMLERLE PAYLAŞIRIZ?</h2> <p>Kişisel verilerinizi, adına bu verileri topladığımız kuruluş ile paylaşırız. Verilerinizi bizim adımıza çalışan alt işleyicilerle paylaşırız. Kişisel verilerinizi asla başka hizmet sağlayıcılara satmayız veya kiralamayız ve Kişisel Verilerinizi GDPR ile uyumlu olmayan herhangi bir hizmet sağlayıcı ile paylaşmayız.</p> <h2>6. KİŞİSEL VERİLERİNİZİ NEREYE AKTARIRIZ?</h2> <p>Kişisel Verilerinizi yalnızca GDPR madde 44'e uygun olmaları halinde Avrupa Ekonomik Alanı dışında yerleşik hizmet sağlayıcılara aktarıyoruz.</p> <h2>7. HANGİ HAKLARA SAHİPSİNİZ?</h2> <p>Kişisel verilerinizi istediğiniz zaman görüntüleme ve Go Vocal'in kişisel verilerinizi kullanımı hakkında bilgi alma hakkına sahipsiniz.</p> <h3>7.1 Düzeltme, silme ve işlemeyi kısıtlama hakkı</h3> <p>Kişisel verilerinizi Go Vocal'e verip vermemeye karar vermekte özgürsünüz. Ayrıca, Go Vocal'den kişisel verilerinizi düzeltmesini, tamamlamasını veya kaldırmasını talep etme hakkına her zaman sahipsiniz. Kişisel verilerin sağlanmasının reddedilmesinin veya silinmesinin talep edilmesinin belirli hizmetlerin artık sunulamayacağı anlamına geldiğini kabul edersiniz. Kişisel verilerinizin işlenmesinin sınırlandırılmasını da talep edebilirsiniz. Hesabınızı platformdan kaldırmayı seçerseniz, hakkınızda toplanan kişisel veriler sunucularımızdan kaldırılacaktır. Hakkınızdaki bazı kişisel bilgiler, güvenlik ve yasal nedenlerle tuttuğumuz günlük verilerinde en çok 30 gün saklanabilir.</p> <h3>7.2 İtiraz hakkı</h3> <p>Ciddi ve meşru nedenlerle kişisel verilerinizin işlenmesine itiraz etme hakkına sahipsiniz. Ayrıca, kişisel verilerinizin doğrudan pazarlama amacıyla kullanılmasına her zaman itiraz etme hakkına sahipsiniz; bu gibi durumlarda neden belirtmek zorunda değilsiniz.</p> <h3>7.3 Veri taşınabilirliği hakkı</h3> <p>Go Vocal'e sağladığınız kişisel verileri yapılandırılmış, tipik ve makine tarafından okunabilir bir biçimde alma ve/veya farklı denetleyicilere aktarma hakkına sahipsiniz.</p> <h3>7.4 Onayı geri çekme hakkı</h3> <p>İşleme önceden verdiğiniz onaya dayandığı sürece, bu onayı geri çekme hakkına sahipsiniz.</p> <h3>7.5 Haklarınızı kullanma</h3> <p>Bu amaçla Go Vocal ile iletişime geçerek, support@govocal.com adresine e-posta göndererek, Pachecolaan 34, 1000 Brüksel, Belçika adresine posta göndererek veya kimlik kartınızın ön yüzünün bir kopyasını eklemeniz koşuluyla Web Sitemizdeki "Bize ulaşın" formunu kullanarak haklarınızı kullanabilirsiniz.</p> <h3>7.6 Otomatik karar verme ve profil oluşturma</h3> <p>Kişisel verilerinizin işlenmesi profil oluşturmayı içermez ve ayrıca Go Vocal tarafından otomatik karar vermeye tabi tutulmayacaktır.</p> <h3>7.7 Şikayette bulunma hakkı</h3> <p>Ülkenizdeki Kişisel Verilerin Gizliliği yetkililerine veya Go Vocal'in tabi olduğu Belçika'daki Kişisel Verilerin Gizliliği yetkililerine şikayette bulunma hakkına sahipsiniz: Drukpersstraat 35, 1000 Brüksel, Belçika, Tel +32 (0)2 274 48 00, Faks +32 (0)2 274 48 35, e-posta: contact@adp-gba.be. Bu, mahkemelerden muafiyet sağlamaz.</p> <h2>8. VERİ TOPLAMA VE İŞLEME HAKKINDA EK BİLGİLER</h2> <h3>Yasal prosedürler</h3> <p>Go Vocal ve bu verileri adına işlediğimiz Kuruluş, Kullanıcının Kişisel Verilerini yasal amaçlarla, bu Uygulamanın veya ilgili hizmetlerin yasa dışı kullanımı durumunda mahkeme veya yasal işlemlerden önceki aşamalar için kullanabilir. Kullanıcı, Go Vocal ve birlikte çalıştığımız Kuruluşun, Verilerin işlenmesi için yetkili devlet kurumlarının talebi üzerine kişisel verileri ifşa etmek zorunda kalabileceğinin farkındadır. Bu işlemenin yasal dayanağı, hüküm ve koşulların kabulü (sözleşme temeli) ve verilen rızadır.</p> <h3>Güvenlik Önlemleri</h3> <p>Go Vocal, kişisel verilerin imha edilmesini, kaybolmasını, tahrif edilmesini, değiştirilmesini, izinsiz erişimini veya üçüncü taraflara hatalı bir şekilde ifşa edilmesini ve bu verilerle ilgili diğer yasaklanmış işlemleri önlemek için teknolojik ve organizasyonel düzeyde ayarlanmış güvenlik önlemleri geliştirmiştir. Go Vocal, kişisel verilerinizin üçüncü bir tarafça yanlış veya yasa dışı kullanımından kaynaklanan doğrudan veya dolaylı kayıplardan hiçbir koşulda sorumlu tutulamaz. Giriş bilgilerinize ve parolanıza izinsiz erişimleri tamamen önlemek de dahil olmak üzere güvenlik talimatlarına her zaman uymalısınız. Web sitesinin bilgisayarınız, IP adresiniz ve kimlik bilgileriniz üzerinden kullanımından ve bunların gizliliğinden yalnızca siz sorumlusunuz.</p> <h3>Bu gizlilik politikasındaki değişiklikler</h3> <p>Go Vocal, Kullanıcıları bu sayfada bilgilendirerek bu gizlilik politikasını istediği zaman değiştirme hakkını saklı tutar. Olası değişiklikler için bu sayfayı kontrol etmenizi öneririz. Son değişikliğin tarihi sayfanın altında belirtilmiştir. Bir Kullanıcı politikadaki herhangi bir değişikliğe itiraz ederse, Kullanıcı bu Uygulamayı kullanmaya devam etmemelidir. Aksi belirtilmedikçe, o tarihte geçerli olan Gizlilik Politikası, topladığımız tüm Kişisel Veriler için geçerlidir.</p> <p><em>En son güncelleme: 17.12.2019</em></p>
    privacy_policy_title: Gi̇zli̇li̇k Politikası
    terms_and_conditions_body: |
      <p>Bu hüküm ve koşullar, platforma katkıda bulunmanın kurallarını ve yönergelerini ana hatlarıyla belirtir ve yapıcı bir diyaloğun sağlanmasına yardımcı olmayı amaçlar.</p> <p>Platformu daha da geliştirmek için fikirlerinizi support@govocal.com adresine gönderebilirsiniz.</p> <h2>Kimler katılabilir?</h2> <p>Platform üzerinden herkes kamuya açık projeleri görüntüleyebilir. İçeriğe katkıda bulunmak istiyorsanız (örneğin, girdi göndermek veya oy kullanmak) kaydolmanız ve bir hesap oluşturmanız gerekir. E-posta adresinizi kullanarak kaydolabilirsiniz; bazı platformlar için mevcut bir Facebook veya Google hesabını kullanarak oturum açmak da mümkün olabilir. Bu hizmetlerden birini kullanırsanız adınız, e-posta adresiniz ve profil fotoğrafınız platform hesabınızla paylaşılacak ve hesabınıza eklenecektir.</p> <p>Hesabınızın oluşturulmasının size sahiplik hakkı vermediğini lütfen unutmayın. Platform  yöneticileri, bu sayfada belirtilen hüküm ve koşullara uyulmaması gibi nedenlerle hesapları reddedebilir, askıya alabilir veya silebilir.</p> <p>Hesabınız için genel koşullar şunlardır: </p> <ul> <li> <strong>Tek bir hesap oluşturabilirsiniz</strong> <p>Kişiler birden fazla hesap oluşturamaz ve tutamaz. Verdiğiniz hesap bilgileri doğru olmalıdır ve bu hesap bir platform yöneticisinin izni olmadan başkasına devredilemez. </p> </li> <li> <strong>Hesabınız ticari tanıtım için kullanılamaz</strong> <p>Hesaplar yalnızca reklam, ürün veya hizmet pazarlama vb. amaçlarla kullanılamaz.</p> </li> <li> <strong>Hesap bilgilerinizi güvenli ve gizli tutmaktan siz sorumlusunuz</strong> <p>Hesabınızı, hesabınızın parolasını ve giriş bilgilerini yalnızca siz kullanabilirsiniz. Hesap güvenliğinizi artırmak için rakamlar, küçük harfler ve büyük harflerden oluşan bir parola kullanmanız önerilir. Hesabınızda meydana gelen herhangi bir kayıp veya hasardan sorumlu değiliz ve çalınmasından (örneğin, kimlik avı yoluyla) sorumlu tutulamayız. Sizden parolanız gibi oturum açma bilgilerinizi hiçbir zaman istemeyiz. </p>  <h2>Platformdaki etkinliğiniz</h2> <p>Güvenli ve üretken katılımı sağlamak için, bu platformda yayınlanabilecek içerik türüne ilişkin bazı kısıtlamalar vardır. Platformda yayınladığınız tüm içerikler aşağıdakilerden arındırılmış olmalıdır:</p> <ul> <li> <strong>Özel veriler</strong> <p>Gizli veriler, telefon numaraları ve adresler gibi başkaları hakkındaki kişisel bilgiler, kişilerin açık izinleri ve rızaları olmadan yayınlanamaz.  </p> <li><strong>Spam / kötü amaçlı yazılım / kimlik avı / virüsler / solucanlar / Truva atları</strong> <p>Başkalarının gizliliğini ihlal etmeyi veya başkalarının tarayıcılarına veya bilgisayarlarına zarar vermeyi veya bozmayı amaçlayan kötü amaçlı içerik veya bağlantılar.</p> </li> <li> <strong>Tehditler, hakaretler ve diğer uygunsuz içerikler </strong> <p>Kişisel saldırılar ve hakaretler, tehdit edici davranışlar veya dil, ayrımcı yorumlar, küfür ve diğer saldırgan dil.</p> </li> <li><strong>Reklam ve ticari faaliyet</strong> <p>Yalnızca ticari bir hizmet veya ürünün reklamını yapmak amacıyla yayınlanan içerik.</p> </li> <li> <strong>Telif hakkıyla korunan materyaller</strong> <p>Fikri mülkiyet haklarını ihlal eden içerikler (örneğin, telif hakkıyla korunan görseller).</p> </li> <li> <strong>Yasa dışı faaliyetler</strong> <p>Herhangi bir şekilde yasa dışı faaliyetleri teşvik eden içerikler.</li></p> </ul> <p>Yukarıdakilerden herhangi birini içeren gönderiler ve diğer içerikler düzenlenebilir, silinebilir veya başka bir şekilde gönderilmesi engellenebilir ve hesap geçici olarak engellenebilir veya kalıcı olarak silinebilir. Geçici veya kalıcı olarak askıya alınmaktan kaçınmak için oluşturulan yeni veya ek hesaplar da izlenebilir ve silinebilir.</p> <h2>Geçerli yasalar</h2> <p>Bir hesabın kullanımı geçerli yasaları ihlal edemez. Bu, gizlilik mevzuatının, fikri mülkiyet haklarının, ceza kanununun vb. ihlalini içerir.</p> <p>Platformda yayınlanan ve yukarıdaki kurallara ve yasalara uymayan içerikten hiçbir şekilde sorumlu tutulamayız. İhlaller support@govocal.com adresine bildirilebilir ve ilgili mesajların silinmesine ve/veya ilgili hesabın askıya alınmasına veya kalıcı olarak iptal edilmesine neden olabilir.</p> <p>Platformda yayınlanan içeriğin zararlı dosyalar veya bağlantılar içermesi mümkündür. Platform üzerinden dosya indirerek veya köprülere erişerek oluşabilecek herhangi bir zararın riskini ve sorumluluğunu kendiniz üstlenirsiniz.</p> <h2>Mülkiyet hakları</h2> <p>Bu platform, içeriği, kaynak kodu, veritabanları vb. ile ilgili fikri mülkiyet hakları ile korunmaktadır. Platformda yayınladığınız tüm orijinal içerikler herkesin kullanımına açıktır ve içeriğinizin atıfta bulunularak paylaşılmasına veya uyarlanmasına izin veren Creative Commons Attribution-ShareAlike 4.0 International (CC BY-SA 4.0) Genel Lisansı kapsamındadır. Platformu ve herkese açık nitelikte olmayan herhangi bir içeriğini izinsiz olarak hiçbir biçimde çoğaltamaz, dağıtamaz, değiştiremez veya iletemezsiniz.</p>
